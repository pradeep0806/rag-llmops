services:
  # ── RAG API ────────────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      # Point Ollama at host machine since it runs outside Docker
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - qdrant
      - mlflow
      - loki
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux compatibility

  # ── Vector Store ───────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Experiment Tracking ────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    volumes:
      - mlflow_data:/mlflow

  # ── Metrics Collection ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle" # ← add this

  # ── Log Aggregation ────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./observability:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml

  # ── Dashboards ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

volumes:
  qdrant_data:
  mlflow_data:
  prometheus_data:
  loki_data:
  grafana_data:
